<div class="dashboard-container">

  <div class="dash-card card-1">
    <div class="card-left">
      <div class="card-title">Counter</div>
      <div class="card-amount">₹ {{ counter | number:'1.0-0' }}</div>
      <div class="card-entries">{{ expenseCount }} entries</div>
    </div>

    <div class="card-right">
      <span class="material-icons">today</span>
    </div>
  </div>

  <div class="dash-card card-2">
    <div class="card-left">
      <div class="card-title">Total Expense</div>
      <div class="card-amount">₹ {{ totalExpenses | number:'1.0-0' }}</div>
      <div class="card-entries">{{ expenseCount }} transaction(s)</div>
    </div>

    <div class="card-right">
      <span class="material-icons">payments</span>
    </div>
  </div>

  <div class="dash-card card-3">
    <div class="card-left">
      <div class="card-title">Transactions</div>
      <div class="card-amount">{{ expenseCount }}</div>
      <div class="card-entries">Entries recorded</div>
    </div>

    <div class="card-right">
      <span class="material-icons">calendar_month</span>
    </div>
  </div>

  <div class="dash-card card-4">
    <div class="card-left">
      <div class="card-title">Categories Used</div>
      <div class="card-amount">{{ categoryCount }}</div>
      <div class="card-entries">Active categories</div>
    </div>

    <div class="card-right">
      <span class="material-icons">category</span>
    </div>
  </div>

</div>
