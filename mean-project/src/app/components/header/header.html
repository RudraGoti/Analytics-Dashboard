<header class="header">

  <!-- LEFT -->
  <div class="header-left">

    <h2 class="page-title">
      {{ pageTitle }}
    </h2>

  </div>

  <!-- RIGHT -->
  <div class="header-right">

    <!-- DATE PICKER -->
    <div class="date-picker-container">
      <div class="date-display" (click)="toggleCalendar()">

  <span class="material-icons calendar-icon-big">
    calendar_month
  </span>

  <span class="selected-date">
    {{ selectedDate | date:'dd MMMM yyyy' }}
  </span>

</div>

      <!-- Calendar Backdrop -->
      <div class="calendar-backdrop" *ngIf="showCalendar" (click)="showCalendar = false"></div>

      <!-- Calendar Popup -->
      <div class="calendar-popup" *ngIf="showCalendar">
        <!-- Calendar Header -->
        <div class="calendar-header">
          <button class="calendar-nav-btn" (click)="previousMonth()" type="button">
            <span class="material-icons">chevron_left</span>
          </button>
          <div class="calendar-month-year">
            {{ currentMonth | date:'MMMM yyyy' }}
          </div>
          <button class="calendar-nav-btn" (click)="nextMonth()" type="button">
            <span class="material-icons">chevron_right</span>
          </button>
        </div>

        <!-- Days of Week -->
        <div class="calendar-weekdays">
          <div class="weekday" *ngFor="let day of weekDays">{{ day }}</div>
        </div>

        <!-- Calendar Days -->
        <div class="calendar-days">
          <button
            *ngFor="let date of calendarDates"
            class="calendar-day"
            [class.other-month]="!isCurrentMonth(date)"
            [class.selected]="isSelectedDate(date)"
            [class.today]="isToday(date)"
            (click)="selectDate(date)"
            type="button"
          >
            {{ date.getDate() }}
          </button>
        </div>
      </div>
    </div>

    <!-- ICONS -->
    <span class="material-icons header-icon">
      notifications
    </span>

    <span class="material-icons header-icon">
      account_circle
    </span>

  </div>

</header>
