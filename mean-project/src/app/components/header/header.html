<header class="header">

  <!-- LEFT -->
  <div class="header-left">

    <h2 class="page-title">
      {{ pageTitle }}
    </h2>

  </div>

  <!-- RIGHT -->
  <div class="header-right">

    <!-- DATE -->
    <div class="header-box">
      <label class="header-date-label" for="app-selected-date">
        <span class="material-icons">
          calendar_today
        </span>
      </label>

      <input
        id="app-selected-date"
        class="header-date-input"
        type="date"
        [(ngModel)]="selectedDate"
        (ngModelChange)="setSelectedDate($event)"
        aria-label="Select report date"
      />
    </div>

    <!-- ICONS -->
    <span class="material-icons header-icon">
      notifications
    </span>

    <span class="material-icons header-icon">
      account_circle
    </span>

  </div>

</header>
